<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#0d1117" rx="24"/>
  <defs>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComponentTransfer in="blur" result="glow"><feFuncA type="linear" slope="1.5"/></feComponentTransfer>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g stroke="#FF7733" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#neon)">
    <path d="M 45 85 L 55 40 L 80 65"/>
    <path d="M 155 85 L 145 40 L 120 65"/>
    <path d="M 45 85 Q 25 130 60 160 Q 100 175 140 160 Q 175 130 155 85"/>
    <!-- nervous eyes: squinted angled lines, like concerned eyebrows + closed eyes -->
    <path d="M 62 100 L 88 108"/>
    <path d="M 138 100 L 112 108"/>
    <!-- wavy worried mouth -->
    <path d="M 90 130 Q 95 125 100 130 Q 105 135 110 130"/>
    <!-- sweat drop -->
    <path d="M 150 100 Q 152 108 150 112 Q 148 108 150 100 Z" fill="#FF7733"/>
  </g>
</svg>
