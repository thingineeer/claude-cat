<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#0d1117" rx="24"/>
  <defs>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComponentTransfer in="blur" result="glow"><feFuncA type="linear" slope="1.8"/></feComponentTransfer>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g stroke="#FF3355" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#neon)">
    <path d="M 45 85 L 55 40 L 80 65"/>
    <path d="M 155 85 L 145 40 L 120 65"/>
    <path d="M 45 85 Q 25 130 60 160 Q 100 175 140 160 Q 175 130 155 85"/>
    <!-- X eyes -->
    <line x1="67" y1="98"  x2="83" y2="112"/>
    <line x1="83" y1="98"  x2="67" y2="112"/>
    <line x1="117" y1="98" x2="133" y2="112"/>
    <line x1="133" y1="98" x2="117" y2="112"/>
    <!-- flat grim mouth -->
    <line x1="88" y1="132" x2="112" y2="132"/>
  </g>
</svg>
