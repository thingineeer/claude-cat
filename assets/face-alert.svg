<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#0d1117" rx="24"/>
  <defs>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComponentTransfer in="blur" result="glow"><feFuncA type="linear" slope="1.5"/></feComponentTransfer>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g stroke="#FFCC33" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#neon)">
    <path d="M 45 85 L 55 40 L 80 65"/>
    <path d="M 155 85 L 145 40 L 120 65"/>
    <path d="M 45 85 Q 25 130 60 160 Q 100 175 140 160 Q 175 130 155 85"/>
    <!-- alert eyes: wider ovals -->
    <ellipse cx="75" cy="105" rx="8" ry="6"/>
    <circle cx="75" cy="105" r="2" fill="#FFCC33" stroke="none"/>
    <ellipse cx="125" cy="105" rx="8" ry="6"/>
    <circle cx="125" cy="105" r="2" fill="#FFCC33" stroke="none"/>
    <!-- flat mouth -->
    <line x1="92" y1="130" x2="108" y2="130"/>
  </g>
</svg>
