<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#0d1117" rx="24"/>
  <defs>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComponentTransfer in="blur" result="glow"><feFuncA type="linear" slope="1.5"/></feComponentTransfer>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g stroke="#00FF88" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#neon)">
    <path d="M 45 85 L 55 40 L 80 65"/>
    <path d="M 155 85 L 145 40 L 120 65"/>
    <path d="M 45 85 Q 25 130 60 160 Q 100 175 140 160 Q 175 130 155 85"/>
    <!-- chill eyes: relaxed horizontal lines -->
    <line x1="65" y1="105" x2="85" y2="105"/>
    <line x1="115" y1="105" x2="135" y2="105"/>
    <!-- soft smile -->
    <path d="M 92 128 Q 100 135 108 128"/>
  </g>
</svg>
