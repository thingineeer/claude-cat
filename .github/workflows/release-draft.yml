name: release-draft

on:
  push:
    branches: [main]

# Every push to main (i.e. a merged release PR) opens or updates a
# draft GitHub Release tagged after package.json's version. The draft
# stays un-published so the maintainer reviews notes + assets before
# going public.
permissions:
  contents: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read version
        id: pkg
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "tag=v$version"    >>"$GITHUB_OUTPUT"
      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.pkg.outputs.tag }}
          VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — leaving it alone."
            exit 0
          fi
          notes="$(awk '/^## /{c++} c==1' CHANGELOG.md | head -200)"
          gh release create "$TAG" \
            --draft \
            --title "claude-cat $TAG" \
            --notes "${notes:-Release $TAG}"
